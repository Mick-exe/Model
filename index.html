<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Luna Rose | Official Links</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap');


:root{

--main:#ff84c1;
--second:#9b5cff;
--text:white;

}


*{

margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;

}


body{

min-height:100vh;

background:
radial-gradient(circle at top,#3b1d4f,#12091c 45%,#050507);

color:white;

display:flex;

justify-content:center;

align-items:center;

padding:30px 15px;

overflow-y:auto;

}


/* luces del fondo */

body::before{

content:"";

position:fixed;

width:400px;
height:400px;

background:#ff84c155;

border-radius:50%;

filter:blur(120px);

top:-150px;
left:-150px;

z-index:0;

}


body::after{

content:"";

position:fixed;

width:350px;
height:350px;

background:#8b5cf655;

border-radius:50%;

filter:blur(120px);

bottom:-120px;
right:-120px;

z-index:0;

}



.card{


width:420px;

max-width:100%;

background:rgba(255,255,255,.08);

border:1px solid rgba(255,255,255,.15);

backdrop-filter:blur(15px);

border-radius:25px;

padding:35px;

text-align:center;

box-shadow:

0 0 40px rgba(0,0,0,.5);

z-index:2;


}


.avatar{

width:150px;

height:150px;

margin:auto;

border-radius:50%;

overflow:hidden;

border:4px solid var(--main);

box-shadow:

0 0 20px var(--main);

}



.avatar img{

width:100%;

height:100%;

object-fit:cover;

}



h1{

margin-top:20px;

font-size:32px;

}



.description{

margin:15px 0 25px;

color:#ddd;

font-size:15px;

}



.links{

display:flex;

flex-direction:column;

gap:15px;

}



.btn{

display:block;

padding:15px;

border-radius:15px;

text-decoration:none;

color:white;

background:rgba(255,255,255,.08);

border:1px solid rgba(255,255,255,.2);

transition:.3s;

font-weight:500;

}



.btn:hover{

transform:translateY(-4px);

background:

linear-gradient(90deg,var(--main),var(--second));


box-shadow:

0 0 20px var(--main),
0 0 35px var(--second);

}




.colors{

display:flex;

justify-content:center;

gap:15px;

margin-top:30px;

}



.color{

width:25px;

height:25px;

border-radius:50%;

cursor:pointer;

border:2px solid white;

}



.color:hover{

transform:scale(1.2);

}



footer{

margin-top:30px;

font-size:12px;

color:#aaa;

}




@media(max-width:600px){


body{

align-items:flex-start;

}


.card{

margin-top:20px;

padding:25px;

}


h1{

font-size:27px;

}


}



</style>

</head>


<body>


<div class="card">


<div class="avatar">

<img src="https://via.placeholder.com/300">

</div>



<h1>
Luna Rose
</h1>



<div class="description">

Official social links<br>

Follow my latest updates

</div>




<div class="links">


<a class="btn" href="#" target="_blank">
📸 Instagram
</a>


<a class="btn" href="#" target="_blank">
🎵 TikTok
</a>


<a class="btn" href="#" target="_blank">
🐦 X / Twitter
</a>


<a class="btn" href="#" target="_blank">
💬 Telegram
</a>


<a class="btn" href="#" target="_blank">
▶ YouTube
</a>


<a class="btn" href="#" target="_blank">
🌐 Website
</a>


<a class="btn" href="#" target="_blank">
⭐ Community
</a>


<a class="btn" href="#" target="_blank">
📩 Contact
</a>


</div>




<div class="colors">


<div class="color"
style="background:#ff84c1"
onclick="changeColor('#ff84c1','#d946ef')">
</div>



<div class="color"
style="background:white"
onclick="changeColor('#ffffff','#a855f7')">
</div>



<div class="color"
style="background:#8b5cf6"
onclick="changeColor('#8b5cf6','#ec4899')">
</div>



</div>



<footer>

© 2026 Official Page

</footer>



</div>




<script>


function changeColor(main,second){


document.documentElement.style.setProperty(
'--main',
main
);


document.documentElement.style.setProperty(
'--second',
second
);


}


</script>



</body>

</html>
