<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Luna Rose | Official Links</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap');


:root{

--main:#ff84c1;
--second:#9b5cff;
--white:#ffffff;

}


*{

margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;

}


body{

min-height:100vh;

background:
linear-gradient(
135deg,
#08070d,
#1c1028,
#09070d
);

color:white;

display:flex;
justify-content:center;
align-items:center;

overflow-y:auto;

padding:30px 15px;

}


/* luces de fondo */

body::before{

content:"";

position:fixed;

width:350px;
height:350px;

background:#ff84c144;

border-radius:50%;

filter:blur(120px);

top:-100px;
left:-100px;

}


body::after{

content:"";

position:fixed;

width:350px;
height:350px;

background:#9b5cff44;

border-radius:50%;

filter:blur(120px);

bottom:-100px;
right:-100px;

}



.card{

width:420px;

background:rgba(255,255,255,.07);

border:1px solid rgba(255,255,255,.15);

border-radius:25px;

padding:35px;

text-align:center;

backdrop-filter:blur(15px);

box-shadow:

0 0 40px rgba(0,0,0,.5);


position:relative;

z-index:2;


}



.avatar{

width:150px;
height:150px;

margin:auto;

border-radius:50%;

overflow:hidden;

border:4px solid var(--main);


box-shadow:

0 0 20px var(--main);


}



.avatar img{

width:100%;
height:100%;

object-fit:cover;

}



h1{

margin-top:20px;

font-size:32px;

letter-spacing:2px;

text-shadow:

0 0 15px var(--main);

}



.description{

margin:20px 0;

color:#ddd;

font-size:15px;

line-height:24px;

}



.links{

display:flex;

flex-direction:column;

gap:15px;

}



.btn{

padding:15px;

border-radius:15px;

background:rgba(255,255,255,.08);

border:1px solid rgba(255,255,255,.2);

color:white;

text-decoration:none;

font-weight:bold;

transition:.3s;


}



.btn:hover{


transform:translateY(-4px);


background:

linear-gradient(
90deg,
var(--main),
var(--second)
);


box-shadow:

0 0 20px var(--main),
0 0 40px var(--second);


}



.colors{

margin-top:30px;

display:flex;

justify-content:center;

gap:15px;

}



.color{

width:25px;
height:25px;

border-radius:50%;

cursor:pointer;

border:2px solid white;

}



footer{

margin-top:30px;

font-size:12px;

color:#aaa;

}



@media(max-width:500px){


body{

align-items:flex-start;

}


.card{

width:100%;

padding:25px;

}



h1{

font-size:26px;

}



}


</style>

</head>


<body>



<div class="card">



<div class="avatar">

<img src="https://via.placeholder.com/300">

</div>



<h1>

Luna Rose

</h1>



<div class="description">

Página oficial de enlaces.<br>

Encuentra aquí todas mis redes sociales.

</div>




<div class="links">


<a class="btn" href="#" target="_blank">
📸 Instagram
</a>


<a class="btn" href="#" target="_blank">
🎵 TikTok
</a>


<a class="btn" href="#" target="_blank">
🐦 X / Twitter
</a>


<a class="btn" href="#" target="_blank">
💬 Telegram
</a>


<a class="btn" href="#" target="_blank">
▶ YouTube
</a>


<a class="btn" href="#" target="_blank">
🌐 Página oficial
</a>


<a class="btn" href="#" target="_blank">
⭐ Mi comunidad
</a>



</div>




<div class="colors">


<div class="color"
style="background:#ff84c1"
onclick="changeColor('#ff84c1','#9b5cff')">
</div>



<div class="color"
style="background:white"
onclick="changeColor('#ffffff','#9b5cff')">
</div>



<div class="color"
style="background:#9b5cff"
onclick="changeColor('#9b5cff','#ff84c1')">
</div
